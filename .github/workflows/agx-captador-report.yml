name: Relatorio diario AGX Captador

on:
  schedule:
    # 12:00 UTC = 09:00 em Brasilia.
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      META_GRAPH_API_VERSION: v20.0
      META_ACCOUNT_ID: act_519770400740924
      CAMPAIGN_NAME_FILTER: "[CAPTADOR]"
      PROJECT_LABEL: "Funil de Aplicação Captador"
      LEAD_ACTION_TYPE: offsite_conversion.fb_pixel_custom
      TELEGRAM_CHAT_ID: "-1001969196147"
      TELEGRAM_MESSAGE_THREAD_ID: "5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send Telegram report
        run: python scripts/send_agx_captador_report.py
