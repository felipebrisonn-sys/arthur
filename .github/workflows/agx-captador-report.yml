name: Relatorio diario AGX Captador

on:
  schedule:
    # Tenta em varios horarios; o primeiro run depois das 09h envia e a trava evita duplicidade.
    - cron: "17 12,14,16,18,20,22 * * *"
  workflow_dispatch:

concurrency:
  group: agx-captador-report
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SENT_MARKER_PATH: .agx-report-sent/sent.txt
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TYPEFORM_ACCESS_TOKEN: ${{ secrets.TYPEFORM_ACCESS_TOKEN }}
      TYPEFORM_FORM_TITLE: "Captador de C.A.S.A."
      META_GRAPH_API_VERSION: v20.0
      META_ACCOUNT_ID: act_8501954776581917
      CAMPAIGN_NAME_FILTER: "[CAPTADOR]"
      PROJECT_LABEL: "Funil de Aplicação Captador"
      LEAD_ACTION_TYPE: offsite_conversion.fb_pixel_custom
      TELEGRAM_CHAT_ID: "-1001969196147"
      TELEGRAM_MESSAGE_THREAD_ID: "301599"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Janela de envio
        id: send-window
        run: |
          date_br="$(TZ=America/Sao_Paulo date +%Y-%m-%d)"
          time_br="$(TZ=America/Sao_Paulo date +%H%M)"
          in_window=false

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            in_window=true
          elif [ "$time_br" -ge 900 ]; then
            in_window=true
          fi

          echo "date=$date_br" >> "$GITHUB_OUTPUT"
          echo "time=$time_br" >> "$GITHUB_OUTPUT"
          echo "in_window=$in_window" >> "$GITHUB_OUTPUT"

      - name: Fora da janela
        if: steps.send-window.outputs.in_window != 'true'
        run: echo "Ainda nao sao 09h em Brasilia; nao enviando."

      - name: Verificar se ja enviou hoje
        if: steps.send-window.outputs.in_window == 'true' && github.event_name != 'workflow_dispatch'
        id: sent-cache
        uses: actions/cache/restore@v4
        with:
          path: .agx-report-sent
          key: agx-captador-sent-${{ steps.send-window.outputs.date }}

      - name: Ja enviado hoje
        if: steps.send-window.outputs.in_window == 'true' && github.event_name != 'workflow_dispatch' && steps.sent-cache.outputs.cache-hit == 'true'
        run: echo "Relatorio ja enviado hoje; pulando duplicata."

      - name: Setup Python
        if: steps.send-window.outputs.in_window == 'true' && (github.event_name == 'workflow_dispatch' || steps.sent-cache.outputs.cache-hit != 'true')
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send Telegram report
        if: steps.send-window.outputs.in_window == 'true' && (github.event_name == 'workflow_dispatch' || steps.sent-cache.outputs.cache-hit != 'true')
        run: python scripts/send_agx_captador_report.py

      - name: Salvar trava do envio de hoje
        if: steps.send-window.outputs.in_window == 'true' && github.event_name != 'workflow_dispatch' && steps.sent-cache.outputs.cache-hit != 'true' && hashFiles('.agx-report-sent/sent.txt') != ''
        uses: actions/cache/save@v4
        with:
          path: .agx-report-sent
          key: agx-captador-sent-${{ steps.send-window.outputs.date }}
