name: Relatorio diario AGX Captador

on:
  schedule:
    # Tenta a cada 5 minutos entre 09:00 e 09:55 em Brasilia.
    - cron: "*/5 12 * * *"
  workflow_dispatch:

concurrency:
  group: agx-captador-report
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SENT_MARKER_PATH: .agx-report-sent/sent.txt
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      META_GRAPH_API_VERSION: v20.0
      META_ACCOUNT_ID: act_519770400740924
      CAMPAIGN_NAME_FILTER: "[CAPTADOR]"
      PROJECT_LABEL: "Funil de Aplicação Captador"
      LEAD_ACTION_TYPE: offsite_conversion.fb_pixel_custom
      TELEGRAM_CHAT_ID: "-1001969196147"
      TELEGRAM_MESSAGE_THREAD_ID: "301599"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dia de envio
        id: sent-date
        run: echo "date=$(TZ=America/Sao_Paulo date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Verificar se ja enviou hoje
        id: sent-cache
        uses: actions/cache/restore@v4
        with:
          path: .agx-report-sent
          key: agx-captador-sent-${{ steps.sent-date.outputs.date }}

      - name: Ja enviado hoje
        if: steps.sent-cache.outputs.cache-hit == 'true'
        run: echo "Relatorio ja enviado hoje; pulando duplicata."

      - name: Setup Python
        if: steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send Telegram report
        if: steps.sent-cache.outputs.cache-hit != 'true'
        run: python scripts/send_agx_captador_report.py

      - name: Salvar trava do envio de hoje
        if: steps.sent-cache.outputs.cache-hit != 'true' && hashFiles('.agx-report-sent/sent.txt') != ''
        uses: actions/cache/save@v4
        with:
          path: .agx-report-sent
          key: agx-captador-sent-${{ steps.sent-date.outputs.date }}
